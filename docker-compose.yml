
services:
  short-creator:
    build:
      context: .
      dockerfile: main.Dockerfile
    env_file:
      - .env
    environment:
      - DEV=false
      - NODE_OPTIONS=--max-old-space-size=4096
    ports:
      - "3123:3123"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["node", "dist/index.js"]
    shm_size: '2gb'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6g
