services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  short-creator:
    build:
      context: .
      dockerfile: main.Dockerfile
    env_file:
      - .env
    environment:
      - DEV=false
      - NODE_OPTIONS=--max-old-space-size=4096
      - KOKORO_MODEL_PRECISION=fp32
      - SKIP_RUNTIME_INSTALL=true
      - PUPPETEER_CACHE_DIR=/app/data/cache/puppeteer
      - HF_HOME=/app/data/cache/huggingface
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ENABLED=true
    ports:
      - "3123:3123"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "2gb"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 6g
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
