services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  short-creator:
    build:
      context: .
      dockerfile: main-tiny.Dockerfile
    env_file:
      - .env
    environment:
      - DEV=false
      - NODE_OPTIONS=--max-old-space-size=4096
      - KOKORO_MODEL_PRECISION=q4
      - SKIP_RUNTIME_INSTALL=true
      - PUPPETEER_CACHE_DIR=/app/data/cache/puppeteer
      - HF_HOME=/app/data/cache/huggingface
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ENABLED=true
    ports:
      - "3123:3123"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "2gb"
    restart: unless-stopped
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 6g

volumes:
  redis_data:
