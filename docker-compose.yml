
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  short-creator:
    build:
      context: .
      dockerfile: main.Dockerfile
    env_file:
      - .env
    environment:
      - DEV=false
      - NODE_OPTIONS=--max-old-space-size=4096
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ENABLED=true
    ports:
      - "3123:3123"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["node", "dist/index.js"]
    shm_size: '2gb'
    restart: unless-stopped
    depends_on:
      - redis
    deploy:

      volumes:
        redis_data:
      resources:
        limits:
          memory: 6g
